<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trick Question Game</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg, #fff7fb, #eef4ff);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:#222;
    }

    .game-box{
      width:100%;
      max-width:760px;
      background:#fff;
      border-radius:24px;
      padding:28px;
      box-shadow:0 14px 40px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      font-size:30px;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:24px;
      line-height:1.6;
    }

    .name-box{
      margin-bottom:18px;
    }

    .name-box input{
      width:100%;
      padding:14px 16px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:15px;
      outline:none;
    }

    .start-btn,
    .next-btn,
    .restart-btn{
      border:none;
      background:#222;
      color:#fff;
      padding:14px 20px;
      border-radius:12px;
      font-size:15px;
      cursor:pointer;
    }

    .start-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:8px;
    }

    .progress{
      font-size:14px;
      color:#777;
      margin-bottom:16px;
      font-weight:700;
    }

    .question{
      font-size:24px;
      font-weight:700;
      line-height:1.5;
      margin-bottom:20px;
    }

    .answers{
      display:grid;
      gap:14px;
    }

    .answers button{
      border:none;
      background:#f3f6ff;
      padding:16px;
      border-radius:14px;
      font-size:16px;
      text-align:left;
      cursor:pointer;
      transition:0.2s ease;
      color:#222;
    }

    .answers button:hover{
      background:#e3eaff;
      transform:translateY(-2px);
    }

    .answers button:disabled{
      opacity:0.8;
      cursor:not-allowed;
      transform:none;
    }

    .feedback-box{
      margin-top:20px;
      background:#f9fbff;
      border-radius:18px;
      padding:20px;
      text-align:center;
      display:none;
    }

    .feedback-emoji{
      font-size:54px;
      margin-bottom:10px;
    }

    .feedback-text{
      font-size:22px;
      font-weight:700;
      margin-bottom:10px;
    }

    .feedback-small{
      color:#666;
      line-height:1.6;
    }

    .next-btn{
      margin-top:18px;
    }

    .result-screen{
      display:none;
      text-align:center;
    }

    .result-screen h2{
      font-size:30px;
      margin-bottom:10px;
    }

    .final-score{
      font-size:24px;
      font-weight:800;
      margin:18px 0;
    }

    .result-note{
      color:#666;
      line-height:1.7;
    }

    .status{
      margin-top:16px;
      font-size:14px;
      color:#444;
      min-height:22px;
    }

    .hidden-form{
      display:none;
    }

    @media (max-width:600px){
      .game-box{
        padding:20px;
      }

      h1{
        font-size:24px;
      }

      .question{
        font-size:20px;
      }

      .answers button{
        font-size:15px;
      }

      .feedback-text{
        font-size:19px;
      }
    }
  </style>
</head>
<body>
  <div class="game-box">
    <div id="startScreen">
      <h1>Trick Question Game</h1>
      <p class="subtitle">Let’s see if your mind is sharp enough for these 5 trick questions 👀</p>
      <div class="name-box">
        <input type="text" id="playerName" placeholder="Enter your name" />
      </div>
      <div class="start-wrap">
        <button class="start-btn" onclick="startGame()">Start Game</button>
      </div>
    </div>

    <div id="quizScreen" style="display:none;">
      <div class="progress" id="progressText"></div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersBox"></div>

      <div class="feedback-box" id="feedbackBox">
        <div class="feedback-emoji" id="feedbackEmoji"></div>
        <div class="feedback-text" id="feedbackText"></div>
        <div class="feedback-small" id="feedbackSmall"></div>
        <button class="next-btn" id="nextBtn">Next Question</button>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <h2>Game Complete 🎉</h2>
      <p class="result-note">Your final result has been calculated.</p>
      <div class="final-score">Score: <span id="finalScore">0</span> / 5</div>
      <p class="result-note" id="finalMessage"></p>
      <div class="status" id="submitStatus">Sending result...</div>
      <button class="restart-btn" onclick="restartGame()" style="margin-top:18px;">Play Again</button>
    </div>

    <!-- Static Netlify form blueprint -->
    <form
      name="cerelac-quiz-results"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      class="hidden-form"
    >
      <input type="hidden" name="form-name" value="cerelac-quiz-results" />
      <input type="text" name="player_name" />
      <input type="text" name="score" />
      <input type="text" name="total" />
      <input type="text" name="result_message" />
      <textarea name="answers"></textarea>
      <input type="text" name="submitted_at" />
      <input type="text" name="bot-field" />
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Some months have 31 days, some have 30. How many have 28 days?",
        answers: ["1", "2", "12", "6"],
        correct: 2,
        explanation: "All 12 months have at least 28 days."
      },
      {
        question: "If a plane crashes on the border of Ghana and Togo, where do they bury the survivors?",
        answers: ["Ghana", "Togo", "Both countries", "Nowhere"],
        correct: 3,
        explanation: "You don’t bury survivors."
      },
      {
        question: "What gets wetter the more it dries?",
        answers: ["A towel", "Water", "Soap", "Rain"],
        correct: 0,
        explanation: "A towel gets wetter while drying you."
      },
      {
        question: "How many animals of each sex did Moses take on the ark?",
        answers: ["2", "1", "None", "4"],
        correct: 2,
        explanation: "It was Noah, not Moses."
      },
      {
        question: "A farmer has 17 sheep. All but 9 run away. How many are left?",
        answers: ["8", "9", "17", "0"],
        correct: 1,
        explanation: "All but 9 ran away, so 9 are left."
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let playerName = "";
    let chosenAnswers = [];
    let resultSent = false;

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");

    const progressText = document.getElementById("progressText");
    const questionText = document.getElementById("questionText");
    const answersBox = document.getElementById("answersBox");
    const feedbackBox = document.getElementById("feedbackBox");
    const feedbackEmoji = document.getElementById("feedbackEmoji");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackSmall = document.getElementById("feedbackSmall");
    const nextBtn = document.getElementById("nextBtn");

    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const submitStatus = document.getElementById("submitStatus");

    function startGame() {
      playerName = document.getElementById("playerName").value.trim() || "Anonymous";
      currentQuestion = 0;
      score = 0;
      chosenAnswers = [];
      resultSent = false;

      startScreen.style.display = "none";
      resultScreen.style.display = "none";
      quizScreen.style.display = "block";

      loadQuestion();
    }

    function loadQuestion() {
      const q = questions[currentQuestion];
      progressText.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
      questionText.textContent = q.question;
      answersBox.innerHTML = "";
      feedbackBox.style.display = "none";

      q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.addEventListener("click", () => checkAnswer(index));
        answersBox.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex) {
      const q = questions[currentQuestion];
      const buttons = answersBox.querySelectorAll("button");

      buttons.forEach(btn => btn.disabled = true);

      chosenAnswers.push({
        question: q.question,
        selected: q.answers[selectedIndex],
        correctAnswer: q.answers[q.correct],
        isCorrect: selectedIndex === q.correct
      });

      feedbackBox.style.display = "block";

      if (selectedIndex === q.correct) {
        score++;
        feedbackEmoji.textContent = "😌";
        feedbackText.textContent = "Yeah, you’re getting a Cerelac";
        feedbackSmall.textContent = q.explanation;
      } else {
        feedbackEmoji.textContent = "🤣";
        feedbackText.textContent = "Wrong answer";
        feedbackSmall.textContent = q.explanation;
      }

      nextBtn.textContent = currentQuestion === questions.length - 1 ? "See Result" : "Next Question";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    function getFinalMessage() {
      if (score === 5) {
        return "Your brain is dangerous. Full Cerelac approved.";
      } else if (score >= 3) {
        return "Not bad at all. You almost outsmarted the game.";
      } else {
        return "The trick questions dealt with you today 🤣";
      }
    }

    function buildAnswersSummary() {
      return chosenAnswers.map((item, index) => {
        return `Question ${index + 1}: ${item.question}
Selected: ${item.selected}
Correct Answer: ${item.correctAnswer}
Result: ${item.isCorrect ? "Correct" : "Wrong"}`;
      }).join("\n\n");
    }

    function showResults() {
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScore.textContent = score;
      finalMessage.textContent = getFinalMessage();
      submitStatus.textContent = "Sending result...";

      submitResultToNetlify();
    }

    function encode(data) {
      return Object.keys(data)
        .map(key => encodeURIComponent(key) + "=" + encodeURIComponent(data[key]))
        .join("&");
    }

    async function submitResultToNetlify() {
      if (resultSent) return;
      resultSent = true;

      const payload = {
        "form-name": "cerelac-quiz-results",
        "player_name": playerName,
        "score": `${score}`,
        "total": `${questions.length}`,
        "result_message": getFinalMessage(),
        "answers": buildAnswersSummary(),
        "submitted_at": new Date().toLocaleString(),
        "bot-field": ""
      };

      try {
        await fetch("/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: encode(payload)
        });

        submitStatus.textContent = "Result sent successfully.";
      } catch (error) {
        console.error("Netlify form submission failed:", error);
        submitStatus.textContent = "Could not send result.";
      }
    }

    function restartGame() {
      document.getElementById("playerName").value = "";
      startScreen.style.display = "block";
      quizScreen.style.display = "none";
      resultScreen.style.display = "none";
      currentQuestion = 0;
      score = 0;
      chosenAnswers = [];
      resultSent = false;
      submitStatus.textContent = "";
    }
  </script>
</body>
</html>
