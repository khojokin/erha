 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trick Question Game</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg, #fff7fb, #eef4ff);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:#222;
    }

    .game-box{
      width:100%;
      max-width:760px;
      background:#fff;
      border-radius:24px;
      padding:28px;
      box-shadow:0 14px 40px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      font-size:30px;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:24px;
      line-height:1.6;
    }

    .progress{
      font-size:14px;
      color:#777;
      margin-bottom:16px;
      font-weight:700;
    }

    .question{
      font-size:24px;
      font-weight:700;
      line-height:1.5;
      margin-bottom:20px;
    }

    .answers{
      display:grid;
      gap:14px;
    }

    .answers button{
      border:none;
      background:#f3f6ff;
      padding:16px;
      border-radius:14px;
      font-size:16px;
      text-align:left;
      cursor:pointer;
      transition:0.2s ease;
      color:#222;
    }

    .answers button:hover{
      background:#e3eaff;
      transform:translateY(-2px);
    }

    .feedback-box{
      margin-top:20px;
      background:#f9fbff;
      border-radius:18px;
      padding:20px;
      text-align:center;
      display:none;
    }

    .feedback-emoji{
      font-size:54px;
      margin-bottom:10px;
    }

    .feedback-text{
      font-size:22px;
      font-weight:700;
      margin-bottom:10px;
    }

    .feedback-small{
      color:#666;
      line-height:1.6;
    }

    .next-btn,
    .restart-btn{
      margin-top:18px;
      border:none;
      background:#222;
      color:#fff;
      padding:14px 20px;
      border-radius:12px;
      font-size:15px;
      cursor:pointer;
    }

    .next-btn:hover,
    .restart-btn:hover{
      opacity:0.92;
    }

    .result-screen{
      display:none;
      text-align:center;
    }

    .result-screen h2{
      font-size:30px;
      margin-bottom:10px;
    }

    .final-score{
      font-size:24px;
      font-weight:800;
      margin:18px 0;
    }

    .result-note{
      color:#666;
      line-height:1.7;
    }

    @media (max-width:600px){
      .game-box{
        padding:20px;
      }

      h1{
        font-size:24px;
      }

      .question{
        font-size:20px;
      }

      .answers button{
        font-size:15px;
      }

      .feedback-text{
        font-size:19px;
      }
    }
  </style>
</head>
<body>
  <div class="game-box">
    <div id="quizScreen">
      <h1>Trick Question Game</h1>
      <p class="subtitle">Let’s see if your mind is sharp enough for these 5 trick questions 👀</p>

      <div class="progress" id="progressText"></div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersBox"></div>

      <div class="feedback-box" id="feedbackBox">
        <div class="feedback-emoji" id="feedbackEmoji"></div>
        <div class="feedback-text" id="feedbackText"></div>
        <div class="feedback-small" id="feedbackSmall"></div>
        <button class="next-btn" id="nextBtn">Next Question</button>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <h2>Game Complete 🎉</h2>
      <p class="result-note">That was your final mind test result.</p>
      <div class="final-score">Score: <span id="finalScore">0</span> / 5</div>
      <p class="result-note" id="finalMessage"></p>
      <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "Some months have 31 days, some have 30. How many have 28 days?",
        answers: ["1", "2", "12", "6"],
        correct: 2,
        explanation: "All 12 months have at least 28 days."
      },
      {
        question: "If a plane crashes on the border of Ghana and Togo, where do they bury the survivors?",
        answers: ["Ghana", "Togo", "Both countries", "Nowhere"],
        correct: 3,
        explanation: "You don’t bury survivors."
      },
      {
        question: "What gets wetter the more it dries?",
        answers: ["A towel", "Water", "Soap", "Rain"],
        correct: 0,
        explanation: "A towel gets wetter while drying you."
      },
      {
        question: "How many animals of each sex did Moses take on the ark?",
        answers: ["2", "1", "None", "4"],
        correct: 2,
        explanation: "It was Noah, not Moses."
      },
      {
        question: "A farmer has 17 sheep. All but 9 run away. How many are left?",
        answers: ["8", "9", "17", "0"],
        correct: 1,
        explanation: "All but 9 ran away, so 9 are left."
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const progressText = document.getElementById("progressText");
    const questionText = document.getElementById("questionText");
    const answersBox = document.getElementById("answersBox");
    const feedbackBox = document.getElementById("feedbackBox");
    const feedbackEmoji = document.getElementById("feedbackEmoji");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackSmall = document.getElementById("feedbackSmall");
    const nextBtn = document.getElementById("nextBtn");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");

    function loadQuestion() {
      const q = questions[currentQuestion];
      progressText.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
      questionText.textContent = q.question;
      answersBox.innerHTML = "";
      feedbackBox.style.display = "none";

      q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.addEventListener("click", () => checkAnswer(index));
        answersBox.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex) {
      const q = questions[currentQuestion];
      const buttons = answersBox.querySelectorAll("button");
      buttons.forEach(btn => btn.disabled = true);

      feedbackBox.style.display = "block";

      if (selectedIndex === q.correct) {
        score++;
        feedbackEmoji.textContent = "😌";
        feedbackText.textContent = "Yeah, you’re getting a Cerelac";
        feedbackSmall.textContent = q.explanation;
      } else {
        feedbackEmoji.textContent = "🤣";
        feedbackText.textContent = "Wrong answer";
        feedbackSmall.textContent = q.explanation;
      }

      if (currentQuestion === questions.length - 1) {
        nextBtn.textContent = "See Result";
      } else {
        nextBtn.textContent = "Next Question";
      }
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    function showResults() {
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScore.textContent = score;

      if (score === 5) {
        finalMessage.textContent = "Your brain is dangerous. Full Cerelac approved.";
      } else if (score >= 3) {
        finalMessage.textContent = "Not bad at all. You almost outsmarted the game.";
      } else {
        finalMessage.textContent = "Go sleep with empty stomach🤣";
      }
    }

    function restartGame() {
      currentQuestion = 0;
      score = 0;
      quizScreen.style.display = "block";
      resultScreen.style.display = "none";
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
